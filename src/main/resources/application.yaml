spring:
  application:
    name: ai-auto-code

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_auto_code
    username: root
    password: niit*2022

logging:
  level:
    # 这会打印出该包下所有 Mapper 接口的详细 SQL 日志
    org.lim.aiautocode.mapper: DEBUG

server:
  port: 8123
  servlet:
      context-path: /api


# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: org.lim.aiautocode.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
